apiVersion: v1
kind: Service
metadata:
  name: grafana-alloy
  namespace: default
  labels:
    app: cleanmap-alloy
spec:
  type: ClusterIP
  selector:
    app: cleanmap-alloy
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: cleanmap-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: cleanmap-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432

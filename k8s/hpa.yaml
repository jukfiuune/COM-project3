apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexora-api-hpa
  labels:
    app: nexora-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexora-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

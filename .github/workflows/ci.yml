name: CI/CD - NexoraAPI

on:
  push:
    branches: [ main, teams-features ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore NexoraAPI/NexoraAPI.csproj

      - name: Build
        run: dotnet build NexoraAPI/NexoraAPI.csproj --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test NexoraAPI.Tests/NexoraAPI.Tests.csproj --no-build --verbosity normal --configuration Debug

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nexora-api:${{ github.sha }} -t nexora-api:latest .

      - name: Verify image
        run: docker images nexora-api
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore Tests/Tests.csproj
          dotnet restore API/API.csproj

      - name: Run backend unit tests
        run: dotnet test Tests/Tests.csproj --no-restore --configuration Release

      - name: Build backend API
        run: dotnet build API/API.csproj --no-restore --configuration Release

      - name: Build Docker Image
        run: |
          IMAGE="martin590/com-project3"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" -f Dockerfile .
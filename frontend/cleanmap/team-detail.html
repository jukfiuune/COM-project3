<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Detail — Nexora</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='12'%3EN%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="teams.css" />
</head>
<body class="teams-page">

<nav class="teams-nav">
  <a class="teams-nav-logo" href="teams.html">← Teams</a>
  <span class="teams-nav-title" id="navTeamName">Team</span>
  <span id="navUserLabel" class="user-label small"></span>
  <button id="authBtn" class="btn ghost btn-sm">Login</button>
</nav>

<main class="teams-main" id="teamContent" style="display:none">
  <div class="teams-header" id="teamHeader"></div>

  <div class="detail-grid">
    <!-- Members card -->
    <section class="detail-card">
      <h3 class="card-title">Members</h3>
      <div id="membersList"></div>
      <div class="add-member-row" id="addMemberCard" style="display:none">
        <input type="text" id="newMemberId" placeholder="User ID or username to add" />
        <button class="btn-primary btn-sm" id="btnAddMember">Add</button>
      </div>
    </section>

    <!-- Images card -->
    <section class="detail-card">
      <h3 class="card-title">Team Images</h3>
      <div id="imagesGrid" class="images-grid"></div>
      <div class="upload-row">
        <input type="file" id="imageFile" accept=".jpg,.jpeg,.png,.webp" />
        <input type="text" id="imageNotes" placeholder="Notes (optional)" />
        <button class="btn-primary btn-sm" id="btnUploadImage">Upload</button>
      </div>
    </section>
  </div>
</main>

<div class="teams-loading" id="pageLoader"><div class="spinner"></div></div>

<div id="toast" class="toast"></div>

<script type="module" src="team-detail.js"></script>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Futuristic Map</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="controls">
<button id="reset">Reset</button>
<button id="clear">Clear markers</button>
<input id="search" placeholder="Search">
<button id="searchBtn">Go</button>
<input id="geojsonFile" type="file">
<button id="exportGeo">Export GeoJSON</button>
<button id="exportJSON">Export JSON</button>
<div id="coords">0,0</div>
</div>

<div id="popup" class="hidden"></div>

<div id="mapContainer">
<canvas id="map"></canvas>
<div class="futuristic-overlay scanlines neon-glow grid"></div>
<div class="top-dots left" aria-hidden="true"></div>
<div class="top-dots right" aria-hidden="true"></div>
<div class="hud">
<div class="hud-ring"></div>
<div class="hud-ring small"></div>
<div class="hud-center">JARVIS</div>
</div>
</div>

<div id="bezel"></div>
<div id="status">Loading...</div>
<script src="app.js"></script>
</body>
</html>

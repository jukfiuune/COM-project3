services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  nexora-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "5432:5432"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MONGODB_CONNECTION_STRING=mongodb://mongodb:27017
      - MONGODB_DATABASE_NAME=nexora
    depends_on:
      - mongodb
    restart: unless-stopped

  nexora-frontend:
    build:
      context: frontend/cleanmap
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    restart: unless-stopped

volumes:
  mongo_data:
